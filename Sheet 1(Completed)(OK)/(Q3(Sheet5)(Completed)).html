<!DOCTYPE html>
<html>
<head>
    <title>Q3</title>
</head>
<body>
    <h1>File Type Filter</h1>
    <label>File Type:</label><br>
    <input type="checkbox" name="fileType" id="cpp" value="cpp" onchange="filterFiles()">C++<br>
    <input type="checkbox" name="fileType" id="html" value="html" onchange="filterFiles()">HTML<br>
    <input type="checkbox" name="fileType" id="css" value="css" onchange="filterFiles()">CSS<br>
    <input type="checkbox" name="fileType" id="js" value="js" onchange="filterFiles()">JavaScript<br>
    <input type="checkbox" name="fileType" id="php" value="php" onchange="filterFiles()">PHP<br>
    <label for="fileList">File List:</label><br>
    <select name="fileList" id="fileList" multiple>
        <option value="war.cpp">war.cpp</option>
        <option value="war.html">war.html</option>
        <option value="war.css">war.css</option>
        <option value="war.js">war.js</option>
        <option value="war.php">war.php</option>
        <option value="sea.cpp">sea.cpp</option>
        <option value="sea.html">sea.html</option>
        <option value="sea.css">sea.css</option>
        <option value="sea.js">sea.js</option>
        <option value="sea.php">sea.php</option>
    </select>
    <script src="(Q3(Sheet5)).js"></script>
</body>
</html>
